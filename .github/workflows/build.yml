name: Build Windows AppX

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-appx:
    name: Build Windows AppX Package
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Generate Prisma client
        run: npm run prisma:generate
      
      - name: Build Next.js + Electron
        run: npm run build && npm run prepare:packaging && npm run electron:assets
      
      - name: Build AppX package
        run: npx electron-builder --win appx --publish never
      
      - name: Upload AppX artifact
        uses: actions/upload-artifact@v4
        with:
          name: qrohl-appx
          path: dist/*.appx
          retention-days: 30
      
      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.appx
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
