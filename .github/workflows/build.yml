name: Build Packages and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (NSIS + AppX)
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Prisma client
        run: npm run prisma:generate
      
      - name: Build Windows packages
        run: npm run build:electron
      
      - name: List artifacts
        shell: bash
        run: ls -lh dist/
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            dist/*.appx
            dist/*.exe
          retention-days: 5

  build-linux:
    name: Build Linux (AppImage)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Prisma client
        run: npm run prisma:generate
      
      - name: Build Linux package
        run: npm run build:appimage
      
      - name: List artifacts
        run: ls -lh dist/
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.AppImage
          retention-days: 5

  create-release:
    name: Create Release with All Artifacts
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-packages
          path: ./artifacts/windows
      
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: ./artifacts/linux
      
      - name: List all artifacts
        run: |
          echo "=== Windows Packages ===" && ls -lh ./artifacts/windows/ || true
          echo "=== Linux Packages ===" && ls -lh ./artifacts/linux/ || true
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/windows/*.appx
            ./artifacts/windows/*.exe
            ./artifacts/linux/*.AppImage
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          body: |
            # Qrohl Release ${{ github.ref_name }}
            
            ## 📦 Packages Included
            
            ### Windows
            - **AppX Package** - For Microsoft Store
            - **NSIS Installer** - Traditional Windows installer
            
            ### Linux
            - **AppImage** - Universal Linux package
            
            ## Installation Instructions
            
            **Windows:**
            - Use the `.appx` file for Microsoft Store
            - Use the `.exe` for direct installation
            
            **Linux:**
            - Use the `.AppImage` for universal Linux
            
            ---
            Built with Next.js + Electron
